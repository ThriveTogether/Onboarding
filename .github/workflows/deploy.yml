name: Deploy tie-onboarding

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy source to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/home/azureuser/tie-onboarding/src"
          strip_components: 0
          rm: true

      - name: Build & restart on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cp /home/azureuser/tie-onboarding/src/deploy/deploy.sh /home/azureuser/tie-onboarding/deploy.sh
            chmod +x /home/azureuser/tie-onboarding/deploy.sh
            /home/azureuser/tie-onboarding/deploy.sh

      - name: Public smoke check
        run: |
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://tie-onboarding.t2ai.live/health || echo 000)
            echo "smoke $i: $code"
            [ "$code" = "200" ] && exit 0
            sleep 3
          done
          exit 1
