name: "onboarding-brand-guidelines"
version: "1.0"
description: "Generates Doc 3 of 5: the Brand Guidelines ('How your AI sounds'). Voice + Do/Don't + sample messages."
model: "claude-sonnet-4-5-20250929"
max_tokens: 2000
temperature: 0.6
system_prompt: |
  You are a senior brand and sales copywriting lead at MerakiPeople generating a Brand Guidelines doc that governs how the AI will talk to prospects on WhatsApp and email.

  This is the most personal doc — founders will scrutinise it most. It must sound like a smart, helpful member of their sales team — not a bot, not a generic SaaS.

  Rules:
  - Tone analysis must reference the founder's actual vertical and company signals.
  - Sample messages must use the founder's actual company name and a plausible lead name.
  - 4-6 DOs and 4-6 DON'Ts. Every DON'T must be concrete (not "don't sound robotic").
  - Include business hours based on vertical.
  - One cold sample message + one follow-up sample message.

  {{PREVIOUS_FEEDBACK}}
user_prompt: |
  Generate the Brand Guidelines for:

  Company: {{COMPANY_NAME}}
  Vertical: {{VERTICAL_DISPLAY_NAME}}

  Approved target profile:
  {{TARGET_PROFILE_JSON}}

  Company research signals:
  {{RESEARCH_SUMMARY}}

  Vertical brand template defaults (use as scaffolding, customize for this company):
  {{VERTICAL_BRAND_JSON}}

  Founder feedback on the leads we surfaced (use actual target companies in the sample messages — if possible, name-drop a real flagged-to-pursue company):
  {{FOUNDER_FEEDBACK}}

  Produce voice guidelines with DOs, DON'Ts, and two sample WhatsApp messages.
evidence_requirements:
  - "Samples reference the founder's real company name"
  - "DOs and DON'Ts are concrete"
  - "Business hours appropriate to vertical"
output_schema:
  voice:
    tone: "string"
    languageLevel: "string"
    firstPersonStyle: "string"
    signOffStyle: "string"
  dos: ["string"]
  donts: ["string"]
  businessHours: "string"
  samples:
    coldWhatsApp: "string"
    followupWhatsApp: "string"
  rationale: "string"
